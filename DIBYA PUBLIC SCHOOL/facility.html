<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facilities | St. Xavier v2</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;800&display=swap" rel="stylesheet">
</head>
<body>
    <header id="main-header"></header>

    <div class="container">
        <h2>Our Facilities</h2>
        <p style="color: #7f8c8d; margin-bottom: 30px;">World-class infrastructure for modern education.</p>

        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="https://picsum.photos/600/450?random=1" alt="Lab">
                <div class="gallery-overlay"><h4>Smart Classrooms</h4><p>Digital learning enabled</p></div>
            </div>
            <div class="gallery-item">
                <img src="https://picsum.photos/600/450?random=2" alt="Library">
                <div class="gallery-overlay"><h4>Central Library</h4><p>Over 10,000+ books</p></div>
            </div>
            <div class="gallery-item">
                <img src="https://picsum.photos/600/450?random=3" alt="Sports">
                <div class="gallery-overlay"><h4>Indoor Sports Hub</h4><p>Table tennis & Badminton</p></div>
            </div>
            <div class="gallery-item">
                <img src="https://picsum.photos/600/450?random=4" alt="Transport">
                <div class="gallery-overlay"><h4>Safe Transport</h4><p>GPS enabled bus fleet</p></div>
            </div>
        </div>
    </div>

    <footer id="main-footer"></footer>
    <script src="script.js"></script>
</body>
</html>
