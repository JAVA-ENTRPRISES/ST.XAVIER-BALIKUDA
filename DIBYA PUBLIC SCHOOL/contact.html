<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | St. Xavier v2</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;800&display=swap" rel="stylesheet">
</head>
<body>
    <header id="main-header"></header>

    <div class="container">
        <h2>Get in Touch</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 50px;">
            <div>
                <h3>Connect With Us</h3>
                <p style="margin-bottom: 20px;">Have questions? Our team is here to help you with the admission process and school inquiries.</p>
                <p><strong>📍 Location:</strong> Bhubaneswar, Odisha</p>
                <p><strong>📞 Phone:</strong> +91 674 123 4567</p>
                <p><strong>✉️ Email:</strong> admission@stxavierbbsr.com</p>
            </div>
            <form style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" placeholder="Your Name" required>
                <input type="text" placeholder="Email Address" required>
                <textarea placeholder="Your Message" style="width: 100%; height: 120px; border: 1px solid #ddd; border-radius: 12px; padding: 10px;"></textarea>
                <button type="submit" style="background: var(--brand-green); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold;">Send Message</button>
            </form>
        </div>
    </div>

    <footer id="main-footer"></footer>
    <script src="script.js"></script>
</body>
</html>
